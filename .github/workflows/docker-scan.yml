# Gole -  ensure the docker  images are security testeted 
name:  Docker Scan

on:
    workflow_call:


jobs: 
    docker-file-lint-and-scan:
          runs-on: ubuntu-latest
          strategy: 
              fail-fast: false
              matrix: 
                  folders: ['backend','frontend'] 
          steps: 
              - name: Code Checkout 
                uses: actions/checkout@v7

              - name: ${{ matrix.folders }} Lint
                uses: hadolint/hadolint-action@v3.1.0
                with: 
                   dockerfile: ${{ matrix.folders }}/Dockerfile

              - name: Docker setup[login]
                uses: docker/login-action@v4
                with:
                 username: ${{ vars.DOCKERHUB_USERNAME }}
                 password: ${{ secrets.DOCKERHUB_TOKEN }}
          
              - name: Docker build ${{ matrix.folders }}
                run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/devboards-${{ matrix.folders }}-advance:latest .
                working-directory: ${{ matrix.folders }}

              - name: Run Trivy vulnelabilty Scanner
                uses: aquasecurity/trivy-action@v0.36.0
                with:
                  image-ref: ${{ vars.DOCKERHUB_USERNAME }}/devboards-${{ matrix.folders }}-advance:latest 
                  format: 'table'
                  exit-code: '1'
                  ignore-unfixed: true
                  vuln-type: 'os,library'
                  severity: 'CRITICAL,HIGH'
                

              
              
    

           
