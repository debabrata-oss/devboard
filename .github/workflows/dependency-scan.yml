# Gola - iv have to ensure the package and dependency have been audiited for security 
name: Dependency Scan 

on:
   workflow_call


jobs: 
      dependency-scan:
             runs-on: ubuntu-latest
             steps:
               - name: Code Chekcout 
                 uses: actions/checkout@v7
                
               - name: Setup Go
                 uses: actions/setup-go@v6
                 with:
                   go-version: 1.22
                   go-version-file: 'go.mod'
                   cache-dependency-path: go.sum

               - name: Install Govulnchekc
                 uses: go install golang.org/x/vuln/cmd/govulncheck@latest

               - name: goVulncheck
                 uses: govulncheck ./backend/..


