# Goal  - I have to Lint,build,Test the code for frontend and backend 
# then push image to docker hub

name: CI

on: 
  push:
     branches:  [advance]

jobs:
   frontend:
      runs-on: ubuntu-latest      
      steps: 
        - name: Checkout code
          uses: actions/checkout@v7

        - name: Setup Node.js 
          uses: actions/setup-node@v6
          with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: fontend/package-lock.json    

        - name: Install npm packages 
          run: npm ci

        - name: Run Linter
          run: npm run lint

        - name: Run Tests
          run: npm run test
        
