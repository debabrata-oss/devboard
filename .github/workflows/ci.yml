# Goal  - I have to Lint,build,Test the code for frontend and backend 
# then push image to docker hub

name: CI

on: 
  push:
     branches:  [advance]

jobs:
   frontend:
      runs-on: ubuntu-latest      
      steps: 
        - name: Checkout code
          uses: actions/checkout@v7

        - name: Setup NodeJs 
          uses: actions/setup-node@v6
          with:
            node-version: '22'
            cache: npm
            cache-dependency-path: frontend/package-lock.json    

        - name: Install npm packages 
          run: npm ci
          working-directory: frontend

        - name: Run Linter
          run: npm run lint 
          working-directory: frontend

        - name: Run Tests
          run: npm run test
          working-directory: frontend

        - name: Docker setup[login]
          uses: docker/login-action@v4
          with:
           username: ${{ vars.DOCKERHUB_USERNAME }}
           password: ${{ secrets.DOCKERHUB_TOKEN }}
          
        - name: Docker build and push 
          uses: docker/build-push-action@v7
          with:
            context: ./frontend/Dockerfile
            file: ./frontend/Dockerfile
            push: true
            tags: ${{ vars.DOCKERHUB_USERNAME }}/devboards-frontend-advance:latest 

        
