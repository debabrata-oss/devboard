# Gole -  To run end to end devsecops pipline 

name: DevSecOps


on:
  push: 
      branches: [master]

jobs:
   
    # Code stage (with shifr left )
    code-quality: 
        uses: ./.github/workflows/code-quality.yml

    # Secret Scanning
    secreate-scaning:
        uses: ./.github/workflows/secreate-scaning.yml 

   # Dependency check 
    dependency-checks:
        uses: ./.github/workflows/dependency-scan.yml

   # Docker  check 
    docker-checks:
        uses: ./.github/workflows/docker-scan.yml
        secrets: inherit
